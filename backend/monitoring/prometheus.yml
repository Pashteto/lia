global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: lia-app
    metrics_path: /metrics
    static_configs:
      - targets: ['app:8080']

  - job_name: node
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
