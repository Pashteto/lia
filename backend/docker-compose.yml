# Local development only. The `dev`/`dev` credentials below are non-production
# and exist solely for this compose stack. Production credentials must come from
# AWS Secrets Manager via the deploy pipeline (IRSA / CSI driver) — never commit
# real secrets here or to git.

services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_USER: dev
      POSTGRES_DB: lia_dev
    volumes:
      - ./data/db/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d lia_dev"]
      interval: 3s
      timeout: 3s
      retries: 10
      # start_period covers initdb's temporary-server bounce on a fresh data dir,
      # so the first "healthy" only fires once the real server is accepting.
      start_period: 15s

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations
    command: ["-path=/migrations", "-database", "postgres://dev:dev@postgres:5432/lia_dev?sslmode=disable", "up"]

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"   # HTTP REST API
      - "9090:9090"   # gRPC
    environment:
      # Database configuration
      DATABASE_ENABLED: "true"
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: dev
      DATABASE_PASSWORD: dev
      DATABASE_NAME: lia_dev
      # HTTP REST API configuration
      HTTP_ENABLED: "true"
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: 8080
      HTTP_MOCK_AUTH: "true"  # Bypass JWT validation for local dev
      # gRPC configuration
      GRPC_ENABLED: "true"
      GRPC_HOST: "0.0.0.0"
      GRPC_PORT: 9090
